name: Build SurvivalPlus

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle manually
        run: |
          wget https://services.gradle.org/distributions/gradle-8.10-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Build with Gradle
        working-directory: ./minecraft-mod
        run: gradle build --no-daemon --stacktrace

      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: SurvivalPlus-1.21.1
          path: minecraft-mod/build/libs/*.jar
